<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Member Portal - My Donations</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f6f8; padding: 40px; }
        .portal-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        h1 { color: #1b365d; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="portal-card">
        <h1>Welcome, <span id="userName">Member</span></h1>
        <p>Here is your individual donation history:</p>
        <table>
            <thead>
                <tr><th>Date</th><th>Type</th><th>Fund</th><th>Amount</th><th>Status</th></tr>
            </thead>
            <tbody id="myDonationsBody"></tbody>
        </table>
        <button onclick="localStorage.clear(); window.location.href='login.html'" style="margin-top:20px;">Logout</button>
    </div>

<script>
async function loadMyDonations() {
    const memberName = localStorage.getItem("username"); // Matches the "official_name"
    document.getElementById("userName").innerText = memberName;

    const res = await fetch("http://localhost:3000/api/collections", {
        headers: { "Authorization": "Bearer " + localStorage.getItem("token") }
    });
    const allCollections = await res.json();

    // Filter only the records that match this member's name
    const myDonations = allCollections.filter(c => c.member_name === memberName);
    
    const tbody = document.getElementById("myDonationsBody");
    myDonations.forEach(c => {
        tbody.innerHTML += `<tr>
            <td>${c.date.split('T')[0]}</td>
            <td>${c.type}</td>
            <td>${c.fund_category}</td>
            <td>₱${c.amount}</td>
            <td>${c.status}</td>
        </tr>`;
    });
}
loadMyDonations();
</script>
</body>
</html>
